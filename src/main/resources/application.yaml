spring:
  docker:
    compose:
      file: docker/compose.yaml
  application:
    name: checkout-pulse
  datasource:
    url: jdbc:postgresql://localhost:5432/checkout-pulse
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # auto-create tables
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

    datasource.hikari:
      maximum-pool-size: 10
  flyway:
    schemas: inventory,orders,payment,shared
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2s
          max-attempts: 3
